<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport Activity Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Airport Activity Explorer</h1>
        <p>A simple tool to see what's happening at airports around the world!</p>
    </header>

    <main>
        <section id="search-section">
            <label for="airportInput">Search by Airport Name or Code:</label>
            <input type="text" id="airportInput" placeholder="e.g. Mumbai, London, or VABB">
            <button onclick="getAirportData()">Search Flights</button>
        </section>

        <section id="filter-section">
            <label for="filterInput">Filter the results below:</label>
            <input type="text" id="filterInput" placeholder="e.g. Scheduled, Delhi, IndiGo..." onkeyup="filterFlights()">
        </section>

        <section id="fun-fact-section">
            <h3>Did You Know?</h3>
            <marquee id="funFactDisplay">Enter an airport to see a fun aviation fact!</marquee>
        </section>

        <section id="results-section">
            <h3>Live Flight Results:</h3>
            <div id="output">
            </div>
        </section>
    </main>

    <div id="fun-airplane">🛩️</div>

    <script src="script.js"></script>
</body>
</html>
